<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontera Frutal — Sweet Vibes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@200;300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080808;
  font-family: 'Inter', sans-serif;
  cursor: none;
  overflow: hidden;
  height: 100vh;
}

#cd { position:fixed; width:8px; height:8px; background:#fff; border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); mix-blend-mode:difference; }
#cr { position:fixed; width:30px; height:30px; border:1px solid rgba(255,255,255,0.4); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); mix-blend-mode:difference; }

#bg-vid {
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:0;
}
#bg-fallback {
  position:fixed; inset:0;
  background: linear-gradient(145deg, #0d0d1a 0%, #131328 50%, #0a1020 100%);
  z-index:0;
  transition: opacity 0.6s;
}

.content {
  position:fixed; inset:0;
  z-index:10;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding-bottom: 64px;
}

.cta {
  display:inline-flex;
  align-items:center;
  gap:14px;
  text-decoration:none;
  padding:16px 42px;
  border:1px solid rgba(255,255,255,0.28);
  border-radius:100px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  opacity:0;
  animation:fade-up 1s 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
  transition:background 0.25s, border-color 0.25s, transform 0.25s;
  cursor:none;
}
.cta:hover {
  background:rgba(0,0,0,0.55);
  border-color:rgba(255,255,255,0.55);
  transform:scale(1.04);
}
.cta-txt {
  font-family:'Inter', sans-serif;
  font-size:11px;
  font-weight:300;
  letter-spacing:0.45em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.85);
}
.cta-arrow {
  width:17px; height:17px;
  stroke:rgba(255,255,255,0.7);
  fill:none;
  stroke-width:1.5;
  stroke-linecap:round;
  stroke-linejoin:round;
  transition:transform 0.25s;
}
.cta:hover .cta-arrow { transform:translateX(4px); }

@keyframes fade-up {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<div id="cd"></div>
<div id="cr"></div>
<div id="bg-fallback"></div>
<video id="bg-vid" autoplay muted loop playsinline preload="auto">
  <source src="VIDEO-frutal.mp4" type="video/mp4">
</video>

<div class="content">
  <a href="presentacion.html" class="cta">
    <span class="cta-txt">Ver presentación</span>
    <svg class="cta-arrow" viewBox="0 0 24 24">
      <line x1="5" y1="12" x2="19" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    </svg>
  </a>
</div>

<script>
  const cd = document.getElementById('cd');
  const cr = document.getElementById('cr');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
  (function raf(){
    rx+=(mx-rx)*0.11; ry+=(my-ry)*0.11;
    cd.style.left=mx+'px'; cd.style.top=my+'px';
    cr.style.left=rx+'px'; cr.style.top=ry+'px';
    requestAnimationFrame(raf);
  })();

  const vid = document.getElementById('bg-vid');
  const fallback = document.getElementById('bg-fallback');
  vid.addEventListener('canplay', () => { fallback.style.opacity='0'; });
  vid.addEventListener('error',   () => { vid.style.display='none'; });
</script>
</body>
</html>
